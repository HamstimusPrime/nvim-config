# Remap prefix from Ctrl+b to Ctrl+a (easier to reach) unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -  (much more intuitive)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Enable mouse support
set -g mouse on


# Start windows and panes at 1 (easier to reach on keyboard)
set -g base-index 1
set -g pane-base-index 1

set -g update-environment "TERM_PROGRAM"

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Smart pane switching with vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'


# Undercurl
if-shell '[[ "$(uname -o)" != "Android" ]]' {
  # set -g default-terminal tmux-256color
  set -g default-terminal "${TERM}"
  set -as terminal-overrides ',*256col*:RGB'
  set -as terminal-overrides ',*:sitm=\E[3m' # Italics support for older ncurses
  set -as terminal-overrides ',*:smxx=\E[9m' # Strikeout
  set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
  set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
}
